version: '3.9'

services:

  db:
    image: postgres:15
    container_name: idotpet-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - idotpet-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: idotpet-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/${DB_NAME}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}

volumes:
  idotpet-data: